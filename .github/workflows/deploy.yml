name: Deploy Go Backend

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Execute Remote Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.TAILSCALE_IP }}
          username: kenura
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # 1. Increase timeout to 30 minutes for the first big download
          command_timeout: 30m 
          script: |
            mkdir -p /opt/deployments/go-backend
            cd /opt/deployments/go-backend

            if not test -d .git
              git clone https://github.com/KRAG-Labs/go-backend.git .
            else
              git fetch --all
              git reset --hard origin/main
            end

            # 2. Use --quiet to stop the thousands of download lines
            docker compose pull --quiet
            docker compose up -d --build
            
            docker image prune -f